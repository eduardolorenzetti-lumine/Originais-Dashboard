<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Originais Lumine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: #e63946;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.25rem;
      color: #fff;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .brand-text strong {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
    }

    .brand-text small {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #888;
      text-transform: uppercase;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .card:hover {
      border-color: #444;
      background: #1a1a1a;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #fff;
    }

    .card-desc {
      font-size: 0.75rem;
      color: #666;
      line-height: 1.5;
    }

    .card-arrow {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="logo-mark">L</div>
    <div class="brand-text">
      <strong>ORIGINAIS</strong>
      <small>Lumine</small>
    </div>
  </div>

  <h1>Ferramentas internas</h1>

  <div class="grid">
    <a href="/dashboard" class="card">
      <span class="card-title">Dashboard</span>
      <span class="card-desc">Cronograma e gestão de projetos originais</span>
      <span class="card-arrow">→</span>
    </a>
  </div>
</body>
</html>
